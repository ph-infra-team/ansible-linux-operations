---
name: ansible-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint
          ansible-galaxy collection install -r collections/requirements.yml
          ansible-galaxy role install -r requirements.yml -p roles/external

      - name: Ansible lint
        run: ansible-lint -c .config/ansible-lint.yml .

      - name: Syntax checks
        run: |
          for playbook in playbooks/*.yml; do
            ansible-playbook -i inventories/example/hosts.yml "$playbook" --syntax-check
          done
